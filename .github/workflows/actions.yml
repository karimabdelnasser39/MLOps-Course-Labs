name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run Tests & Coverage
        # This ensures the build fails if tests don't pass
        run: |
          uv sync
          uv run pytest tests/ -v --cov=app --cov=main --cov-fail-under=90

  build-and-push:
    needs: test-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.KARIM_DOCKER_HUB }}
          password: ${{ secrets.KARIM_DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Uses your specific secret name to tag the image correctly
          tags: ${{ secrets.KARIM_DOCKER_HUB }}/churn-prediction:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pulls using the corrected secret name
            docker pull ${{ secrets.KARIM_DOCKER_HUB }}/churn-prediction:latest
            docker stop churn-api || true
            docker rm churn-api || true
            docker run -d --name churn-api -p 80:8000 ${{ secrets.KARIM_DOCKER_HUB }}/churn-prediction:latest