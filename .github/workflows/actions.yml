name: MLOps CI/CD Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Adjusted to a standard version for Churn lab

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests
        run: uv run pytest

  build-and-push:
    needs: test-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This automatically tags the image with your username
          tags: ${{ secrets.DOCKER_USERNAME }}/mlops-course-labs-app:latest

  deploy-to-ec2:
    name: Connecting to EC2 instance
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Connect to EC2 instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # env vars are not available in the remote SSH shell,
          # so the image name and port are hardcoded here
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mlops-course-labs-app:latest
            docker stop churn-prediction-api || true
            docker rm churn-prediction-api || true
            docker run -d -p 443:8000 --name churn-prediction-api \
              ${{ secrets.DOCKER_USERNAME }}/mlops-course-labs-app:latest